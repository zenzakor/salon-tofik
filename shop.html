<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر صالون توفيق</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; color: #333; display: flex; flex-direction: column; min-height: 100vh;}
        header { background-color: #000000; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .header-logo { height: 60px; max-width: 180px; object-fit: contain; }
        
        .nav-right { display: flex; align-items: center; gap: 20px;}
        nav { display: flex; align-items: center; gap: 20px;}
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; transition: color 0.3s; cursor: pointer; position: relative;}
        .nav-item:hover { color: #aaa; }
        .nav-icon { font-size: 26px; margin-bottom: 4px; }
        .nav-text { font-size: 13px; font-weight: bold; }
        .cart-badge { background-color: #ff4d4d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; position: absolute; top: -5px; right: -5px; font-weight: bold;}
        
        .container { padding: 40px 20px; max-width: 1100px; margin: auto; flex: 1;}
        .page-title { text-align: center; margin-bottom: 40px;}
        .products-grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center;}
        
        .product-card { position: relative; background-color: #fff; border: 1px solid #eee; padding: 20px; border-radius: 8px; width: 260px; text-align: center; transition: box-shadow 0.3s;}
        .product-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.1); transform: translateY(-5px); transition: 0.3s;}
        .product-card h3 { color: #111; margin-top: 10px; font-size: 18px;}
        .product-card .price { font-size: 22px; font-weight: bold; color: #000; margin: 15px 0; }
        
        /* تصميم شارة الخصم */
        .sale-badge { background: #ff4d4d; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-left: 8px; font-weight: bold; vertical-align: middle;}
        .old-price { text-decoration: line-through; color: #999; font-size: 16px; margin-right: 8px; font-weight: normal;}
        
        .info-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.9); color: #000; border: 1px solid #ddd; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: serif; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; z-index: 10;}
        .info-btn:hover { background: #000; color: #fff; transform: scale(1.1); }
        .btn-add { background-color: #000000; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-size: 16px; width: 100%; font-weight: bold; transition: 0.3s;}
        .btn-add:hover { background-color: #333; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #666; font-weight: bold; transition: 0.3s;}
        .close-modal:hover { color: #000; transform: scale(1.1);}

        footer { background-color: #000000; color: white; padding: 40px 20px 20px; text-align: center; margin-top: auto;}
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;}
        .social-icons a { color: white; font-size: 28px; text-decoration: none; transition: 0.3s; }
        .social-icons a:hover { color: #aaa; transform: scale(1.1); }
        .footer-logo { height: 50px; margin-bottom: 15px; opacity: 0.8;}
        .footer-text { color: #888; font-size: 14px; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;}
        .footer-text strong { color: #fff; letter-spacing: 1px;}
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="assets/logo-white.png" class="header-logo" alt="TOFIK ZAKOR"></a>
        <div class="nav-right">
            <nav>
                <a href="index.html" class="nav-item">
                    <span class="material-symbols-outlined nav-icon">home</span>
                    <span class="nav-text">الرئيسية</span>
                </a>
                <a href="book.html" class="nav-item">
                    <span class="material-symbols-outlined nav-icon">calendar_month</span>
                    <span class="nav-text">حجز دور</span>
                </a>
            </nav>
            <div class="nav-item" onclick="goToCart()">
                <span class="material-symbols-outlined nav-icon">shopping_cart</span>
                <span class="nav-text">السلة</span>
                <div id="cartCount" class="cart-badge">0</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>🛍️ متجر صالون توفيق</h1>
            <p style="color: #666;">أضيفي المنتجات إلى سلتك وأكملي عملية الشراء بسهولة.</p>
        </div>
        <div id="productsContainer" class="products-grid"><div style="text-align: center; width: 100%;">جاري تحميل المنتجات... ⏳</div></div>
    </div>

    <div id="productInfoModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeInfoModal()">&times;</span>
            <img id="infoImg" src="" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd;">
            <h2 id="infoTitle" style="margin-top: 0; color: #111;">اسم المنتج</h2>
            <p id="infoDesc" style="text-align: justify; color: #555; line-height: 1.6; font-size: 16px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; white-space: pre-wrap;"></p>
        </div>
    </div>

    <footer>
        <img src="assets/logo-white.png" class="footer-logo" alt="صالون توفيق">
        <p style="color: #ccc; margin-bottom: 25px; font-size: 15px;">الجمال الذي تستحقينه، بين يديك.</p>
        <div class="social-icons">
            <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
        </div>
        <div class="footer-text">
            © 2026 صالون توفيق. جميع الحقوق محفوظة. <br><br>
            Made by <strong>ZINEDINE ZAKOR</strong>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyACn-sXRnniaNvtV97KWg43O5MrvvB8VD8", authDomain: "salon-tofik.firebaseapp.com", projectId: "salon-tofik", storageBucket: "salon-tofik.firebasestorage.app", messagingSenderId: "479343315632", appId: "1:479343315632:web:ba955286e8c18d60bcc975" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = JSON.parse(localStorage.getItem('salonCart')) || [];
        function updateCartBadge() { let totalItems = 0; cart.forEach(item => totalItems += (item.quantity || 1)); document.getElementById('cartCount').innerText = totalItems; }
        updateCartBadge(); 

        window.goToCart = function() { window.location.href = "cart.html"; };

        window.openInfoModal = function(name, desc, img) {
            document.getElementById('infoTitle').innerText = name;
            document.getElementById('infoDesc').innerText = desc ? desc : "لا توجد تفاصيل إضافية لهذا المنتج حالياً.";
            document.getElementById('infoImg').src = img;
            document.getElementById('productInfoModal').style.display = 'flex';
        }
        window.closeInfoModal = function() { document.getElementById('productInfoModal').style.display = 'none'; }
        window.addEventListener('click', (event) => { if (event.target === document.getElementById('productInfoModal')) closeInfoModal(); });

        async function loadShopProducts() {
            const container = document.getElementById("productsContainer");
            const querySnapshot = await getDocs(collection(db, "Products"));
            container.innerHTML = ""; 
            if (querySnapshot.empty) { container.innerHTML = "<p>المتجر فارغ حالياً.</p>"; return; }

            querySnapshot.forEach((documentSnap) => {
                const data = documentSnap.data();
                const productId = documentSnap.id;
                const imgUrl = data.imageUrl ? data.imageUrl : 'https://via.placeholder.com/250x150?text=No+Image';
                
                const safeName = data.name ? data.name.replace(/'/g, "\\'").replace(/"/g, '&quot;') : '';
                const desc = data.description || '';
                const safeDesc = desc.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n').replace(/\r/g, '');
                
                // ترتيب السعر (مع أو بدون خصم)
                let priceHtml = `<p class="price">${data.price} ₪</p>`;
                if (data.originalPrice) {
                    priceHtml = `<p class="price"><span class="sale-badge">خصم</span> ${data.price} ₪ <span class="old-price">${data.originalPrice} ₪</span></p>`;
                }
                
                const card = document.createElement("div"); card.className = "product-card";
                card.innerHTML = `
                    <div class="info-btn" onclick="openInfoModal('${safeName}', '${safeDesc}', '${imgUrl}')">i</div>
                    <img src="${imgUrl}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 10px;">
                    <h3>${data.name}</h3>
                    ${priceHtml}
                `;
                
                const addBtn = document.createElement("button"); addBtn.className = "btn-add"; addBtn.innerText = "أضف إلى السلة 🛒";
                addBtn.onclick = () => {
                    const existingProductIndex = cart.findIndex(item => item.id === productId);
                    if (existingProductIndex !== -1) { cart[existingProductIndex].quantity = (cart[existingProductIndex].quantity || 1) + 1; } 
                    else { cart.push({ id: productId, name: data.name, price: data.price, image: imgUrl, quantity: 1 }); }
                    localStorage.setItem('salonCart', JSON.stringify(cart)); updateCartBadge();
                    addBtn.innerText = "✔ تمت الإضافة"; addBtn.style.backgroundColor = "#4CAF50";
                    setTimeout(() => { addBtn.innerText = "أضف إلى السلة 🛒"; addBtn.style.backgroundColor = "#000000"; }, 1500);
                };
                card.appendChild(addBtn); container.appendChild(card);
            });
        }
        loadShopProducts();
    </script>
</body>
</html>
